name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.check.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=HEAD^" >> "$GITHUB_OUTPUT"
          fi
      - name: Detect non-docs changes
        id: check
        run: |
          CHANGED=$(git diff --name-only "${{ steps.base.outputs.sha }}" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          # Treat the PR as code-changing UNLESS every changed file matches
          # the docs-only allowlist (Markdown / docs/ / LICENSE / issue
          # templates). The workflow itself counts as code so that edits to
          # this file always run the suite once.
          if echo "$CHANGED" | grep -qvE '^(.*\.md|docs/.*|LICENSE|\.github/ISSUE_TEMPLATE/.*)$'; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Docs-only PR — skip pytest
        if: needs.detect-changes.outputs.code_changed == 'false'
        run: |
          echo "::notice::Skipping pytest run — PR only touches docs (*.md / docs/ / LICENSE / issue templates)."

      - name: Set up Python ${{ matrix.python-version }}
        if: needs.detect-changes.outputs.code_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        if: needs.detect-changes.outputs.code_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        if: needs.detect-changes.outputs.code_changed == 'true'
        run: pytest tests/ -v --cov=bridge --cov-report=term-missing
